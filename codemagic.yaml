workflows:
  android-workflow:
    name: Android APK Workflow
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      groups:
        - google_play # For keystore if needed
      vars:
        PACKAGE_NAME: "com.aria.core"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - navicorazondoflamingonavioptic@gmail.com
