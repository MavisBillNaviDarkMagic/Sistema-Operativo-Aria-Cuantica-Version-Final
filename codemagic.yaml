workflows:
  android-workflow:
    name: Android APK Workflow
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      java: 21
      groups:
        - google_play # For keystore if needed
      vars:
        PACKAGE_NAME: "com.aria.core"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync
      - name: Build Android APK
        script: |
          java -version
          gradle -v
          cd android
          # Use the system's gradle if available, otherwise try to fix the wrapper
          if command -v gradle >/dev/null 2>&1; then
            gradle assembleDebug
          else
            # Fallback: try to download a clean wrapper if gradle is not in PATH
            curl -L https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
            chmod +x gradlew
            ./gradlew assembleDebug
          fi
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - navicorazondoflamingonavioptic@gmail.com
